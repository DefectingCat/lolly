servers:
  - listen: ":18080"
    static:
      - path: "/"
        root: "./testdata"
        index:
          - "index.html"
    proxy:
      - path: "/api"
        targets:
          - url: "http://127.0.0.1:18081"

monitoring:
  pprof:
    enabled: true
    path: "/debug/pprof"
    allow:
      - "127.0.0.1"

performance:
  file_cache:
    max_entries: 1000
    max_size: 104857600
    inactive: 60s

logging:
  format: "text"
  access:
    path: ""
    format: "json"
    sample_rate: 0.1
  error:
    path: ""
    level: "warn"
